# Configuration
baseURL: https://example.org/
title: HIlight3R

enableRobotsTXT: true
enableGitInfo: true
enableEmoji: true
# hasCJKLanguage: false

defaultContentLanguage: en
languages:
  en:
    languageName: English
    weight: 1
  ru:
    languageName: Русский
    weight: 2

module:
  imports:
    - path: github.com/imfing/hextra

enableInlineShortcodes: true

menu:
  main:
    - identifier: about
      name: About
      pageRef: about
      weight: 1
    - identifier: documentation
      name: Documentation
      pageRef: docs
      weight: 2
    - identifier: blog
      name: Blog
      pageRef: blog
      weight: 3
    - name: Search
      weight: 4
      params:
        type: search
    - name: GitHub
      url: https://github.com/HIlight3R
      weight: 5
      params:
        icon: github
    - name: Telegram
      url: https://t.me/HIlight3R
      weight: 6
      params:
        icon: paper-airplane
    - name: Discord
      url: https://github.com/HIlight3R
      weight: 7
      params:
        icon: discord
    - name: Mail
      url: mailto:hilight3r7@gmail.com
      weight: 8
      params:
        icon: mail

params:
  navbar:
    displayTitle: true
    displayLogo: true
    logo:
      path: images/logo.png
      # dark: images/logo-dark.svg
      width: 48
      height: 48
      # link: /
    width: wide

  page:
    # full (100%), wide (90rem), normal (1280px)
    width: normal

  footer:
    displayCopyright: true
    displayPoweredBy: false
    width: wide

  displayUpdatedDate: true
  dateFormat: 02.01.2006

  search:
    enable: true

  editURL:
    enable: true
    base: https://github.com/HIlight3R/hilight3r.github.io/edit/master/content
